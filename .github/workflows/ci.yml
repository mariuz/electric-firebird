name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      firebird:
        image: jacobalberty/firebird:3.0
        env:
          ISC_PASSWORD: masterkey
          FIREBIRD_DATABASE: /firebird/data/test.fdb
          FIREBIRD_USER: sysdba
          FIREBIRD_PASSWORD: masterkey
        ports:
          - 3050:3050
        options: >-
          --health-cmd "nc -z localhost 3050"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Firebird client library
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libfbclient2
          # Provide libfbclient.so symlink expected by node-firebird-driver-native
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libfbclient.so.2 \
                      /usr/lib/x86_64-linux-gnu/libfbclient.so

      - name: Install root dependencies
        run: npm install

      - name: Build packages
        run: npm run build -w packages/firebird-wasm

      - name: Run unit tests
        working-directory: packages/firebird-wasm
        env:
          FIREBIRD_HOST: localhost
          FIREBIRD_USER: SYSDBA
          FIREBIRD_PASSWORD: masterkey
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: packages/firebird-wasm/coverage/
          if-no-files-found: ignore
